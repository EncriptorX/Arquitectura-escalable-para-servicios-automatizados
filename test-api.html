<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        button {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px 5px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #0284c7;
        }
        pre {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .error {
            color: #ef4444;
        }
        .success {
            color: #10b981;
        }
    </style>
</head>
<body>
    <h1>Test API - Solicitar Protección</h1>
    
    <div>
        <h2>1. Health Check (GET)</h2>
        <button onclick="testHealthCheck()">Test GET /api/solicitar-proteccion</button>
        <pre id="health-result">Esperando...</pre>
    </div>

    <div>
        <h2>2. Test POST (Sin Token)</h2>
        <button onclick="testPostWithoutToken()">Test POST sin Turnstile Token</button>
        <pre id="post-no-token-result">Esperando...</pre>
    </div>

    <div>
        <h2>3. Test POST (Con Token Falso)</h2>
        <button onclick="testPostWithFakeToken()">Test POST con Token Falso</button>
        <pre id="post-fake-token-result">Esperando...</pre>
    </div>

    <script>
        const API_URL = '/api/solicitar-proteccion';

        async function testHealthCheck() {
            const resultEl = document.getElementById('health-result');
            resultEl.textContent = 'Cargando...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'GET'
                });
                
                const data = await response.json();
                
                resultEl.className = response.ok ? 'success' : 'error';
                resultEl.textContent = JSON.stringify({
                    status: response.status,
                    statusText: response.statusText,
                    data: data
                }, null, 2);
            } catch (error) {
                resultEl.className = 'error';
                resultEl.textContent = 'Error: ' + error.message;
            }
        }

        async function testPostWithoutToken() {
            const resultEl = document.getElementById('post-no-token-result');
            resultEl.textContent = 'Cargando...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        company: "Test Company",
                        email: "test@example.com",
                        urls: ["https://example.com"]
                    })
                });
                
                const data = await response.json();
                
                resultEl.className = response.status === 400 ? 'success' : 'error';
                resultEl.textContent = JSON.stringify({
                    status: response.status,
                    statusText: response.statusText,
                    data: data,
                    expected: 'Debería retornar 400 - Falta token'
                }, null, 2);
            } catch (error) {
                resultEl.className = 'error';
                resultEl.textContent = 'Error: ' + error.message;
            }
        }

        async function testPostWithFakeToken() {
            const resultEl = document.getElementById('post-fake-token-result');
            resultEl.textContent = 'Cargando...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        company: "Test Company",
                        email: "test@example.com",
                        urls: ["https://example.com"],
                        turnstileToken: "fake-token-12345"
                    })
                });
                
                const data = await response.json();
                
                resultEl.className = response.status === 403 ? 'success' : 'error';
                resultEl.textContent = JSON.stringify({
                    status: response.status,
                    statusText: response.statusText,
                    data: data,
                    expected: 'Debería retornar 403 - Token inválido'
                }, null, 2);
            } catch (error) {
                resultEl.className = 'error';
                resultEl.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
