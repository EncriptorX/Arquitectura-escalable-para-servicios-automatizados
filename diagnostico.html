<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico del Servicio de Protección</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .mode-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .mode-real {
            background: #10b981;
            color: white;
        }
        
        .mode-simulation {
            background: #f59e0b;
            color: white;
        }
        
        .config-item {
            background: #f9fafb;
            border-left: 4px solid #e5e7eb;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        
        .config-item.configured {
            border-left-color: #10b981;
            background: #f0fdf4;
        }
        
        .config-item.not-configured {
            border-left-color: #ef4444;
            background: #fef2f2;
        }
        
        .config-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .config-value {
            font-family: 'Courier New', monospace;
            color: #666;
            font-size: 13px;
        }
        
        .status-icon {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-icon.green {
            background: #10b981;
        }
        
        .status-icon.red {
            background: #ef4444;
        }
        
        .instructions {
            background: #fef3c7;
            border: 2px solid #f59e0b;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .instructions h3 {
            color: #92400e;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .instructions ol {
            margin-left: 20px;
            color: #78350f;
        }
        
        .instructions li {
            margin-bottom: 8px;
            line-height: 1.6;
        }
        
        .success-box {
            background: #d1fae5;
            border: 2px solid #10b981;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .success-box h3 {
            color: #065f46;
            margin-bottom: 10px;
        }
        
        .success-box p {
            color: #047857;
            line-height: 1.6;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
        
        .error-box {
            background: #fee2e2;
            border: 2px solid #ef4444;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔍 Diagnóstico del Servicio</h1>
            <p class="subtitle">Verificación de configuración y modo de operación</p>
            
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Cargando diagnóstico...</p>
            </div>
            
            <div id="content" style="display: none;">
                <div id="mode-section"></div>
                <div id="config-section"></div>
                <div id="status-section"></div>
                <div id="instructions-section"></div>
                
                <button class="refresh-btn" onclick="loadDiagnostic()">🔄 Actualizar Diagnóstico</button>
            </div>
        </div>
    </div>

    <script>
        async function loadDiagnostic() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            
            loading.style.display = 'block';
            content.style.display = 'none';
            
            try {
                const response = await fetch('/api/diagnostico');
                const data = await response.json();
                
                displayDiagnostic(data);
                
                loading.style.display = 'none';
                content.style.display = 'block';
            } catch (error) {
                loading.innerHTML = `
                    <div class="error-box">
                        <h3>❌ Error al cargar diagnóstico</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 10px;">Asegúrate de que el servidor esté corriendo.</p>
                    </div>
                `;
            }
        }
        
        function displayDiagnostic(data) {
            // Modo actual
            const modeClass = data.modo_actual === 'REAL' ? 'mode-real' : 'mode-simulation';
            const modeIcon = data.modo_actual === 'REAL' ? '✅' : '⚠️';
            document.getElementById('mode-section').innerHTML = `
                <div class="mode-badge ${modeClass}">
                    ${modeIcon} MODO ${data.modo_actual}
                </div>
            `;
            
            // Configuración
            let configHTML = '<h2 style="margin-bottom: 20px;">Configuración de Variables de Entorno</h2>';
            
            for (const [key, value] of Object.entries(data.configuracion)) {
                const configClass = value.configurado ? 'configured' : 'not-configured';
                const iconClass = value.configurado ? 'green' : 'red';
                const statusText = value.configurado ? 'Configurado' : 'NO CONFIGURADO';
                
                configHTML += `
                    <div class="config-item ${configClass}">
                        <div class="config-name">
                            <span class="status-icon ${iconClass}"></span>
                            ${key}
                        </div>
                        <div class="config-value">
                            ${statusText}: ${value.preview}
                            ${value.configurado ? `(${value.longitud} caracteres)` : ''}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('config-section').innerHTML = configHTML;
            
            // Estado
            let statusHTML = '<h2 style="margin: 30px 0 20px 0;">Estado del Servicio</h2>';
            
            const estados = [
                {
                    label: 'Validación Turnstile',
                    value: data.estado.puede_validar_turnstile,
                    description: 'Puede verificar que los usuarios no son bots'
                },
                {
                    label: 'Protección Real de Cloudflare',
                    value: data.estado.puede_aplicar_proteccion_real,
                    description: 'Puede aplicar configuraciones reales en Cloudflare'
                },
                {
                    label: 'Modo Simulación',
                    value: data.estado.modo_simulacion_activo,
                    description: 'Solo simula protección sin hacer cambios reales',
                    inverse: true
                }
            ];
            
            estados.forEach(estado => {
                const isActive = estado.inverse ? !estado.value : estado.value;
                const iconClass = isActive ? 'green' : 'red';
                const statusText = isActive ? 'Activo' : 'Inactivo';
                
                statusHTML += `
                    <div class="config-item">
                        <div class="config-name">
                            <span class="status-icon ${iconClass}"></span>
                            ${estado.label}: ${statusText}
                        </div>
                        <div class="config-value">${estado.description}</div>
                    </div>
                `;
            });
            
            document.getElementById('status-section').innerHTML = statusHTML;
            
            // Instrucciones
            let instructionsHTML = '';
            
            if (data.instrucciones && data.instrucciones.length > 0) {
                data.instrucciones.forEach(instr => {
                    if (instr.prioridad === 'INFO') {
                        instructionsHTML += `
                            <div class="success-box">
                                <h3>${instr.mensaje}</h3>
                                <p>${instr.estado}</p>
                            </div>
                        `;
                    } else {
                        instructionsHTML += `
                            <div class="instructions">
                                <h3>⚠️ ${instr.accion}</h3>
                                <p style="margin-bottom: 15px; color: #78350f;">
                                    <strong>Prioridad:</strong> ${instr.prioridad}<br>
                                    <strong>Variable:</strong> ${instr.variable}
                                </p>
                                <ol>
                                    ${instr.pasos.map(paso => `<li>${paso}</li>`).join('')}
                                </ol>
                            </div>
                        `;
                    }
                });
            }
            
            document.getElementById('instructions-section').innerHTML = instructionsHTML;
        }
        
        // Cargar al inicio
        loadDiagnostic();
    </script>
</body>
</html>
